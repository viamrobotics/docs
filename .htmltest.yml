DirectoryPath: "dist"
EnforceHTTPS: true
IgnoreEmptyHref: true
IgnoreInternalEmptyHash: true
IgnoreDirectoryMissingTrailingSlash: false
# Rate limiting. htmltest has no per-request delay option, and MaxConcurrency /
# RequestDelay / Timeout are NOT valid htmltest keys -- they were silently
# ignored, so external links were being checked at the default concurrency of
# 16, hitting each domain with a burst of simultaneous requests. That is what
# caused the transient 403/429/timeout failures on otherwise-valid links (for
# example docs.flutter.dev, apps.apple.com, ri.cmu.edu). Limit HTTP concurrency
# to 1 so external links are checked one at a time and no single domain is hit
# in a burst.
HTTPConcurrencyLimit: 1
ExternalTimeout: 30
IgnoreURLs:
  # Valid links that automated checkers cannot verify: pkg.go.dev rate-limits
  # requests (HTTP 429); analog.com, fandom.com, cloud.google.com, and ebay.com
  # block non-browser clients (HTTP 403); jordanorelli.com intermittently drops
  # connections (EOF).
  - "pkg.go.dev"
  - "analog.com"
  - "fandom.com"
  - "cloud.google.com"
  - "jordanorelli.com"
  - "ebay.com"
  - "example.com"
  - "^/misc/js/script.js$"
  - "linkedin.com"
  - "app.viam.com"
  - "beaglebone.local"
  - "instagram.com"
  - "twitter.com"
  - "github.com/viamrobotics/docs"
  - "github.com/viam-devrel/pick-and-place"
  - "github.com/viam-devrel/so-arm101-palletizing"
  - "openai.com"
  - "espressif.com"
  - "pinout.xyz"
  - "play.google.com"
  - "scuttlerobot.org"
  - "numato.com"
  - "nvidia.com"
  - "slamtec.com"
  - "universal-robots.com"
  - "digikey.com"
  - "ufactory.cc"
  - "medium.com"
  - "radxa.com"
  - "electronics-tutorials.ws"
  - "marketplace.visualstudio.com"
  - "chrome.google.com"
  - "raspberrypi.com"
  - "grabcad.com"
  - "orangepi.org"
  - "rtk2go.com"
  - "researchgate.net"
  - "trinamic.com"
  - "viam.setup"
  - "web.archive"
  - "elevenlabs.io"
  - "docs.m5stack.com"
  - "code.visualstudio.com"
  - "thingiverse.com"
  - "unsplash.com"
  - "docs.github.com"
  - "bugs.launchpad.net"
  - "grpc.io"
  - "odroid.com"
  - "viamapplications.com"
IgnoreDirs:
  - "lib"
CacheExpires: "6h"
# IgnoreDirs: - if we need to ever ignore files
