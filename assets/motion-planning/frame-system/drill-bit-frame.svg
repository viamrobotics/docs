<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aR3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#e8483b"/></marker>
    <marker id="aG3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#2faf5a"/></marker>
    <marker id="aB3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#2f6fe0"/></marker>
    <symbol id="triad3" overflow="visible">
      <line x1="0" y1="0" x2="28" y2="0" stroke="#e8483b" stroke-width="2.5" marker-end="url(#aR3)"/>
      <text x="32" y="4" fill="#e8483b" font-size="12" font-style="italic">x</text>
      <line x1="0" y1="0" x2="0" y2="-28" stroke="#2f6fe0" stroke-width="2.5" marker-end="url(#aB3)"/>
      <text x="4" y="-28" fill="#2f6fe0" font-size="12" font-style="italic">z</text>
      <line x1="0" y1="0" x2="-18" y2="13" stroke="#2faf5a" stroke-width="2.5" marker-end="url(#aG3)"/>
      <text x="-28" y="21" fill="#2faf5a" font-size="12" font-style="italic">y</text>
      <circle cx="0" cy="0" r="3" fill="#111"/>
    </symbol>
  </defs>

  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b2733">Adding a drill-tip frame to a cobot</text>

  <!-- arm -->
  <rect x="70" y="252" width="64" height="30" rx="4" fill="#8893a3"/>
  <line x1="102" y1="252" x2="150" y2="140" stroke="#9aa6b5" stroke-width="15" stroke-linecap="round"/>
  <circle cx="150" cy="140" r="8" fill="#6d7a8c"/>
  <line x1="150" y1="140" x2="312" y2="128" stroke="#9aa6b5" stroke-width="15" stroke-linecap="round"/>

  <!-- flange + drill -->
  <rect x="288" y="120" width="48" height="16" rx="3" fill="#b8c0cc"/>
  <rect x="298" y="136" width="28" height="44" rx="5" fill="#cfd6df"/>
  <path d="M304,180 L320,180 L317,194 L307,194 Z" fill="#9aa6b5"/>
  <line x1="312" y1="194" x2="312" y2="246" stroke="#7d8a9c" stroke-width="3.5"/>

  <!-- offset -->
  <line x1="312" y1="128" x2="312" y2="246" stroke="#8893a3" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="322" y="200" font-size="12" fill="#41506a">80 mm</text>

  <!-- frames -->
  <use href="#triad3" x="312" y="128"/>
  <text x="250" y="112" font-size="12.5" font-weight="bold" fill="#1b2733">my-arm frame</text>
  <use href="#triad3" x="312" y="246"/>
  <text x="330" y="250" font-size="12.5" font-weight="bold" fill="#1b2733">drill-tip frame</text>

  <text x="320" y="306" text-anchor="middle" font-size="13" fill="#1b2733">The drill-tip frame sits 80 mm along z from the arm's frame. A WorldState</text>
  <text x="320" y="324" text-anchor="middle" font-size="13" fill="#1b2733">transform adds it for one Move call, so the planner places the bit on target.</text>
</svg>
