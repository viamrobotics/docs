<svg xmlns="http://www.w3.org/2000/svg" width="640" height="266" viewBox="0 164 640 266" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="aR" markerWidth="6" markerHeight="6" refX="4" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 z" fill="#e23b3b"/></marker>
    <marker id="aG" markerWidth="6" markerHeight="6" refX="4" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 z" fill="#2fa84f"/></marker>
    <marker id="aB" markerWidth="6" markerHeight="6" refX="4" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 z" fill="#2f6fe0"/></marker>

    <!-- exact triads from end-effector-types.svg. triadL = fatter (focus, Z down); triadS = thinner (context, Z up) -->
    <symbol id="triadL" overflow="visible">
      <line x1="0" y1="0" x2="-22" y2="15" stroke="#2fa84f" stroke-width="2.4" marker-end="url(#aG)"/>
      <line x1="0" y1="0" x2="0" y2="24" stroke="#2f6fe0" stroke-width="2.4" marker-end="url(#aB)"/>
      <line x1="0" y1="0" x2="24" y2="0" stroke="#e23b3b" stroke-width="2.4" marker-end="url(#aR)"/>
      <circle cx="0" cy="0" r="3" fill="#1f2937"/>
    </symbol>
    <symbol id="triadS" overflow="visible">
      <line x1="0" y1="0" x2="16" y2="-11" stroke="#2fa84f" stroke-width="2" marker-end="url(#aG)"/>
      <line x1="0" y1="0" x2="0" y2="-22" stroke="#2f6fe0" stroke-width="2" marker-end="url(#aB)"/>
      <line x1="0" y1="0" x2="22" y2="0" stroke="#e23b3b" stroke-width="2" marker-end="url(#aR)"/>
      <circle cx="0" cy="0" r="2.6" fill="#1f2937"/>
    </symbol>
    <!-- pitch joint (DH): blue Z out of the page along the rotation axis, red X along the link, green Y up -->
    <symbol id="triadPitch" overflow="visible">
      <line x1="0" y1="0" x2="22" y2="0" stroke="#e23b3b" stroke-width="2" marker-end="url(#aR)"/>
      <line x1="0" y1="0" x2="0" y2="-22" stroke="#2fa84f" stroke-width="2" marker-end="url(#aG)"/>
      <line x1="0" y1="0" x2="-14" y2="10" stroke="#2f6fe0" stroke-width="2" marker-end="url(#aB)"/>
      <circle cx="0" cy="0" r="2.6" fill="#1f2937"/>
    </symbol>

    <symbol id="armP" overflow="visible">
      <ellipse cx="0" cy="5" rx="44" ry="7" fill="#000000" opacity="0.08"/>
      <rect x="-30" y="-20" width="60" height="22" rx="5" fill="#6b7480" stroke="#444b54" stroke-width="1.5"/>
      <rect x="-11" y="-31" width="22" height="13" rx="3" fill="#7a828d" stroke="#444b54" stroke-width="1.2"/>
      <line x1="0" y1="-30" x2="64" y2="-150" stroke="#444b54" stroke-width="20" stroke-linecap="round"/>
      <line x1="0" y1="-30" x2="64" y2="-150" stroke="#c2cad4" stroke-width="15" stroke-linecap="round"/>
      <line x1="64" y1="-150" x2="196" y2="-150" stroke="#444b54" stroke-width="20" stroke-linecap="round"/>
      <line x1="64" y1="-150" x2="196" y2="-150" stroke="#c2cad4" stroke-width="15" stroke-linecap="round"/>
      <line x1="196" y1="-150" x2="196" y2="-122" stroke="#444b54" stroke-width="18" stroke-linecap="round"/>
      <line x1="196" y1="-150" x2="196" y2="-122" stroke="#c2cad4" stroke-width="13" stroke-linecap="round"/>
      <circle cx="0" cy="-30" r="11" fill="#aab2bd" stroke="#444b54" stroke-width="1.5"/><circle cx="0" cy="-30" r="4" fill="#7a828d"/>
      <circle cx="64" cy="-150" r="11" fill="#aab2bd" stroke="#444b54" stroke-width="1.5"/><circle cx="64" cy="-150" r="4" fill="#7a828d"/>
      <circle cx="196" cy="-150" r="10" fill="#aab2bd" stroke="#444b54" stroke-width="1.5"/><circle cx="196" cy="-150" r="3.5" fill="#7a828d"/>
      <rect x="180" y="-124" width="32" height="10" rx="2" fill="#b7bfca" stroke="#444b54" stroke-width="1.2"/>
    </symbol>
  </defs>

  <use href="#armP" x="170" y="378"/>

  <!-- world frame, on the ground beside the base -->
  <use href="#triadS" x="84" y="376"/>
  <text x="84" y="398" text-anchor="middle" font-size="12" fill="#41506a">world frame</text>

  <!-- chain frames -->
  <use href="#triadPitch" x="170" y="348"/>
  <use href="#triadPitch" x="234" y="228"/>
  <use href="#triadPitch" x="366" y="228"/>
  <use href="#triadL" x="366" y="264"/>

  <!-- shoulder joint -->
  <line x1="194" y1="350" x2="214" y2="362" stroke="#6b7480" stroke-width="1.2"/>
  <text x="218" y="366" font-size="12" fill="#41506a">my-arm:shoulder_lift_joint</text>
  <!-- elbow joint -->
  <line x1="226" y1="200" x2="236" y2="224" stroke="#6b7480" stroke-width="1.2"/>
  <text x="222" y="194" text-anchor="end" font-size="12" fill="#41506a">my-arm:elbow_joint</text>
  <!-- wrist joint -->
  <line x1="380" y1="202" x2="370" y2="224" stroke="#6b7480" stroke-width="1.2"/>
  <text x="386" y="196" font-size="12" fill="#41506a">my-arm:wrist_1_joint</text>
  <!-- my-arm flange frame -->
  <line x1="392" y1="262" x2="414" y2="256" stroke="#6b7480" stroke-width="1.2"/>
  <text x="418" y="260" font-size="12.5" font-weight="bold" fill="#1f2937">my-arm frame</text>

  <text x="320" y="420" text-anchor="middle" font-size="12.5" fill="#41506a">Viam creates a frame at every joint and at the tool flange.</text>
</svg>
