<svg xmlns="http://www.w3.org/2000/svg" width="780" height="360" viewBox="0 0 780 360" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 z" fill="#e23b3b"/></marker>
    <marker id="aG" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 z" fill="#2fa84f"/></marker>
    <marker id="aB" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 z" fill="#2f6fe0"/></marker>
    <marker id="arw" markerWidth="11" markerHeight="11" refX="8" refY="3.6" orient="auto"><path d="M0,0 L9,3.6 L0,7.2 z" fill="#475569"/></marker>
    <symbol id="triadL" overflow="visible">
      <line x1="0" y1="0" x2="24" y2="0" stroke="#e23b3b" stroke-width="2.4" marker-end="url(#aR)"/>
      <text x="28" y="4" fill="#e23b3b" font-size="11.5" font-style="italic">x</text>
      <line x1="0" y1="0" x2="0" y2="-24" stroke="#2f6fe0" stroke-width="2.4" marker-end="url(#aB)"/>
      <text x="4" y="-25" fill="#2f6fe0" font-size="11.5" font-style="italic">z</text>
      <line x1="0" y1="0" x2="-16" y2="11" stroke="#2fa84f" stroke-width="2.4" marker-end="url(#aG)"/>
      <text x="-26" y="19" fill="#2fa84f" font-size="11.5" font-style="italic">y</text>
      <circle cx="0" cy="0" r="3" fill="#1f2937"/>
    </symbol>
    <symbol id="armP" overflow="visible">
      <ellipse cx="0" cy="5" rx="44" ry="7" fill="#000000" opacity="0.08"/>
      <rect x="-30" y="-20" width="60" height="22" rx="5" fill="#6b7480" stroke="#444b54" stroke-width="1.5"/>
      <rect x="-11" y="-31" width="22" height="13" rx="3" fill="#7a828d" stroke="#444b54" stroke-width="1.2"/>
      <line x1="0" y1="-30" x2="64" y2="-150" stroke="#444b54" stroke-width="20" stroke-linecap="round"/>
      <line x1="0" y1="-30" x2="64" y2="-150" stroke="#c2cad4" stroke-width="15" stroke-linecap="round"/>
      <line x1="64" y1="-150" x2="196" y2="-150" stroke="#444b54" stroke-width="20" stroke-linecap="round"/>
      <line x1="64" y1="-150" x2="196" y2="-150" stroke="#c2cad4" stroke-width="15" stroke-linecap="round"/>
      <line x1="196" y1="-150" x2="196" y2="-122" stroke="#444b54" stroke-width="18" stroke-linecap="round"/>
      <line x1="196" y1="-150" x2="196" y2="-122" stroke="#c2cad4" stroke-width="13" stroke-linecap="round"/>
      <circle cx="0" cy="-30" r="11" fill="#aab2bd" stroke="#444b54" stroke-width="1.5"/>
      <circle cx="0" cy="-30" r="4" fill="#7a828d"/>
      <circle cx="64" cy="-150" r="11" fill="#aab2bd" stroke="#444b54" stroke-width="1.5"/>
      <circle cx="64" cy="-150" r="4" fill="#7a828d"/>
      <circle cx="196" cy="-150" r="10" fill="#aab2bd" stroke="#444b54" stroke-width="1.5"/>
      <circle cx="196" cy="-150" r="3.5" fill="#7a828d"/>
      <rect x="180" y="-124" width="32" height="10" rx="2" fill="#b7bfca" stroke="#444b54" stroke-width="1.2"/>
    </symbol>
    <symbol id="drillP" overflow="visible">
      <rect x="-16" y="0" width="32" height="30" rx="7" fill="#5f6873" stroke="#3c424a" stroke-width="1.2"/>
      <path d="M-8,30 L8,30 L5,41 L-5,41 Z" fill="#9aa3af" stroke="#444b54" stroke-width="1"/>
      <line x1="0" y1="41" x2="0" y2="64" stroke="#5b626c" stroke-width="3.5" stroke-linecap="round"/>
    </symbol>
  </defs>

  <use href="#armP" x="90" y="300"/>
  <use href="#drillP" x="286" y="186"/>

  <!-- workpiece carrying target_pose -->
  <path d="M515,236 L645,236 L677,210 L547,210 Z" fill="#e0bd6b" stroke="#7a5e22" stroke-width="1.2"/>
  <path d="M515,236 L645,236 L645,292 L515,292 Z" fill="#c99c42" stroke="#7a5e22" stroke-width="1.2"/>
  <path d="M645,236 L677,210 L677,266 L645,292 Z" fill="#ad8836" stroke="#7a5e22" stroke-width="1.2"/>
  <use href="#triadL" x="592" y="223"/>
  <text x="600" y="205" font-size="12.5" font-weight="bold" fill="#1f2937">target_pose</text>

  <!-- the two frames you could name -->
  <use href="#triadL" x="286" y="186"/>
  <text x="198" y="180" font-size="12.5" font-weight="bold" fill="#1f2937">arm frame</text>
  <use href="#triadL" x="286" y="250"/>
  <text x="300" y="270" font-size="12.5" font-weight="bold" fill="#1f2937">drill-tip frame</text>

  <!-- each frame can be sent to target_pose -->
  <path d="M318,180 Q448,148 566,214" fill="none" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arw)"/>
  <path d="M318,252 Q452,276 568,234" fill="none" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arw)"/>

  <text x="390" y="340" text-anchor="middle" font-size="13" fill="#41506a">The same target_pose moves a different point depending on which frame you name.</text>
</svg>
