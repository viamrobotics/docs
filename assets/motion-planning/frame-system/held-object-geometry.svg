<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <symbol id="armP" overflow="visible">
      <ellipse cx="0" cy="5" rx="44" ry="7" fill="#000000" opacity="0.08"/>
      <rect x="-30" y="-20" width="60" height="22" rx="5" fill="#6b7480" stroke="#444b54" stroke-width="1.5"/>
      <rect x="-11" y="-31" width="22" height="13" rx="3" fill="#7a828d" stroke="#444b54" stroke-width="1.2"/>
      <line x1="0" y1="-30" x2="64" y2="-150" stroke="#444b54" stroke-width="20" stroke-linecap="round"/>
      <line x1="0" y1="-30" x2="64" y2="-150" stroke="#c2cad4" stroke-width="15" stroke-linecap="round"/>
      <line x1="64" y1="-150" x2="196" y2="-150" stroke="#444b54" stroke-width="20" stroke-linecap="round"/>
      <line x1="64" y1="-150" x2="196" y2="-150" stroke="#c2cad4" stroke-width="15" stroke-linecap="round"/>
      <line x1="196" y1="-150" x2="196" y2="-122" stroke="#444b54" stroke-width="18" stroke-linecap="round"/>
      <line x1="196" y1="-150" x2="196" y2="-122" stroke="#c2cad4" stroke-width="13" stroke-linecap="round"/>
      <circle cx="0" cy="-30" r="11" fill="#aab2bd" stroke="#444b54" stroke-width="1.5"/>
      <circle cx="0" cy="-30" r="4" fill="#7a828d"/>
      <circle cx="64" cy="-150" r="11" fill="#aab2bd" stroke="#444b54" stroke-width="1.5"/>
      <circle cx="64" cy="-150" r="4" fill="#7a828d"/>
      <circle cx="196" cy="-150" r="10" fill="#aab2bd" stroke="#444b54" stroke-width="1.5"/>
      <circle cx="196" cy="-150" r="3.5" fill="#7a828d"/>
      <rect x="180" y="-124" width="32" height="10" rx="2" fill="#b7bfca" stroke="#444b54" stroke-width="1.2"/>
    </symbol>
    <symbol id="gripperP" overflow="visible">
      <rect x="-18" y="0" width="36" height="13" rx="3" fill="#9aa3af" stroke="#444b54" stroke-width="1.2"/>
      <rect x="-17" y="13" width="8" height="30" rx="2" fill="#b7bfca" stroke="#444b54" stroke-width="1.1"/>
      <rect x="9" y="13" width="8" height="30" rx="2" fill="#b7bfca" stroke="#444b54" stroke-width="1.1"/>
    </symbol>
  </defs>

  <use href="#armP" x="135" y="275"/>

  <!-- collision geometry wrapping the held object -->
  <rect x="311" y="166" width="42" height="112" rx="4" fill="#f59e0b" fill-opacity="0.20" stroke="#d97706" stroke-width="1.6" stroke-dasharray="6 4"/>
  <rect x="325" y="170" width="14" height="100" rx="4" fill="#d9a441" stroke="#9c6f1d" stroke-width="1.2"/>
  <use href="#gripperP" x="332" y="161"/>

  <text x="366" y="182" font-size="12.5" font-weight="bold" fill="#b45309">collision geometry</text>
  <line x1="364" y1="186" x2="353" y2="198" stroke="#d97706" stroke-width="1"/>

  <!-- obstacle the planner routes the held object around -->
  <path d="M470,244 L560,244 L584,224 L494,224 Z" fill="#aab2bd" stroke="#5b6470" stroke-width="1"/>
  <path d="M470,244 L560,244 L560,296 L470,296 Z" fill="#8893a3" stroke="#5b6470" stroke-width="1"/>
  <path d="M560,244 L584,224 L584,276 L560,296 Z" fill="#6b7480" stroke="#5b6470" stroke-width="1"/>
  <text x="515" y="316" text-anchor="middle" font-size="12" fill="#41506a">obstacle</text>

  <text x="350" y="332" text-anchor="middle" font-size="13" fill="#41506a">Attach the object's geometry to the frame, and the planner routes the held object around obstacles.</text>
</svg>
