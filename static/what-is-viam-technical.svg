<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 693 570" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .layer-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
      .box-label { font-size: 13px; font-weight: 600; }
      .arrow-label { font-size: 10px; font-style: italic; }
    </style>
  </defs>

  <!-- ==================== YOUR CODE SDK (left side) ==================== -->
  <rect x="0" y="102" width="110" height="155" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="55" y="122" text-anchor="middle" class="box-label" fill="#252525">Your Code</text>
  <text x="55" y="138" text-anchor="middle" style="font-size:10px; fill:#808080">(SDK)</text>
  <line x1="10" y1="146" x2="100" y2="146" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="55" y="164" text-anchor="middle" style="font-size:10px; fill:#808080">consistent APIs across</text>
  <text x="55" y="180" text-anchor="middle" style="font-size:10px; fill:#808080">hardware and services</text>
  <line x1="10" y1="190" x2="100" y2="190" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="55" y="208" text-anchor="middle" style="font-size:10px; fill:#808080">Python · Go</text>
  <text x="55" y="224" text-anchor="middle" style="font-size:10px; fill:#808080">TS · C++ · Flutter</text>
  <text x="55" y="246" text-anchor="middle" style="font-size:9px; fill:#252525; font-style:italic">runs anywhere</text>

  <!-- Arrow from SDK top, curving right to app.viam.com -->
  <path d="M55,102 L55,67 Q55,52 70,52 L120,52" fill="none" stroke="#252525" stroke-width="1.2"/>
  <polygon points="117,48 126,52 117,56" fill="#252525"/>
  <text x="85" y="30" text-anchor="middle" style="font-size:10px; fill:#252525">WebRTC signaling</text>

  <!-- Arrow from SDK bottom, curving right to YOUR MACHINE -->
  <path d="M55,257 L55,282 Q55,297 70,297 L120,297" fill="none" stroke="#252525" stroke-width="1.2"/>
  <polygon points="117,293 126,297 117,301" fill="#252525"/>
  <text x="88" y="320" text-anchor="middle" style="font-size:10px; fill:#252525">WebRTC / gRPC</text>

  <!-- ==================== CLOUD LAYER ==================== -->
  <rect x="130" y="2" width="558" height="105" rx="6" fill="#f7f6f3" stroke="#252525" stroke-width="1.5"/>
  <text x="147" y="24" class="layer-label" fill="#252525">app.viam.com</text>

  <!-- Cloud boxes -->
  <rect x="142" y="34" width="125" height="60" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="204" y="54" text-anchor="middle" class="box-label" fill="#252525">Fleet Management</text>
  <text x="204" y="70" text-anchor="middle" style="font-size:10px; fill:#808080">config · deploys</text>
  <text x="204" y="84" text-anchor="middle" style="font-size:10px; fill:#808080">monitoring</text>

  <rect x="275" y="34" width="85" height="60" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="317" y="54" text-anchor="middle" class="box-label" fill="#252525">Data</text>
  <text x="317" y="70" text-anchor="middle" style="font-size:10px; fill:#808080">storage · query</text>
  <text x="317" y="84" text-anchor="middle" style="font-size:10px; fill:#808080">export</text>

  <rect x="368" y="34" width="85" height="60" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="410" y="54" text-anchor="middle" class="box-label" fill="#252525">ML</text>
  <text x="410" y="70" text-anchor="middle" style="font-size:10px; fill:#808080">datasets · training</text>
  <text x="410" y="84" text-anchor="middle" style="font-size:10px; fill:#808080">models</text>

  <rect x="461" y="34" width="105" height="60" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="513" y="54" text-anchor="middle" class="box-label" fill="#252525">Registry</text>
  <text x="513" y="70" text-anchor="middle" style="font-size:10px; fill:#808080">modules · models</text>
  <text x="513" y="84" text-anchor="middle" style="font-size:10px; fill:#808080">training scripts</text>

  <rect x="574" y="34" width="102" height="60" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="625" y="54" text-anchor="middle" class="box-label" fill="#252525">Apps</text>
  <text x="625" y="70" text-anchor="middle" style="font-size:10px; fill:#808080">auth · billing</text>
  <text x="625" y="84" text-anchor="middle" style="font-size:10px; fill:#808080">dashboards</text>

  <!-- ==================== ARROWS: Cloud ↔ Machine ==================== -->
  <line x1="350" y1="112" x2="350" y2="138" stroke="#252525" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="346,136 350,143 354,136" fill="#252525"/>
  <text x="362" y="130" class="arrow-label" fill="#252525">config · modules · ML models</text>

  <line x1="530" y1="143" x2="530" y2="117" stroke="#252525" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="526,119 530,112 534,119" fill="#252525"/>
  <text x="542" y="130" class="arrow-label" fill="#252525">data · logs · machine status</text>

